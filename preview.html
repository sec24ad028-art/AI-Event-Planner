<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Event Planning Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">

        <h1>🎉 AI-Powered Event Planning Assistant</h1>

        <p>
            Plan Weddings, Birthday Parties, Temple Functions,
            Corporate Events and more using Artificial Intelligence.
        </p>

        <img src="https://images.unsplash.com/photo-1511578314322-379afb476865?w=700"
             alt="Event">

    </div>

    <div class="right">

        <div class="login-box">

            <h2>Welcome Back</h2>

            <input type="text" placeholder="Email or Username">

            <input type="password" placeholder="Password">

            <button onclick="login()">Log In</button>

            <div class="or">OR</div>

            <button class="google">
                Continue with Google
            </button>

            <button class="facebook">
                Continue with Facebook
            </button>

            <p>
                Don't have an account?
                <a href="#">Sign Up</a>
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
